<div class="login-contenedor">
    <button class="boton-tema" style="position: absolute; top: 20px; right: 20px; background: var(--color-bg-card); border: 1px solid var(--color-border); border-radius: 50%; width: 40px; height: 40px; color: var(--color-text-main); cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-sm);" (click)="toggleTema()" title="Cambiar tema">
        @if (isDark()) { 
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2"></path><path d="M12 20v2"></path><path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="m6.34 17.66-1.41 1.41"></path><path d="m19.07 4.93-1.41 1.41"></path></svg>
        } @else { 
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></svg>
        }
    </button>
    <div class="login-tarjeta">
        <h1>GestProy</h1>
        <p>Inicia sesión para continuar</p>

        @if (error()) {
        <div class="login-error">{{ error() }}</div>
        }

        <div class="login-campo">
            <label for="correo">Correo</label>
            <input id="correo" type="email" placeholder="Ingresa tu correo" [ngModel]="correo()"
                (ngModelChange)="correo.set($event)" (keydown.enter)="iniciarSesion()" />
        </div>

        <div class="login-campo">
            <label for="contraseña">Contraseña</label>
            <input id="contraseña" type="password" placeholder="Ingresa tu contraseña" [ngModel]="password()"
                (ngModelChange)="password.set($event)" (keydown.enter)="iniciarSesion()" />
        </div>

        <button class="login-boton" (click)="iniciarSesion()" [disabled]="cargando()">
            @if (cargando()) {
            Ingresando...
            } @else {
            Ingresar
            }
        </button>
        <p class="login-link">
            No tienes cuenta? <span (click)="irARegistro()">Registrate</span>
        </p>
    </div>
</div>
